      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({platform:'youtube',url:url})});
    if(r.ok){ btn.textContent='✓ 분석 요청됨'; btn.style.background='#059669'; }
    else{ btn.textContent=orig; btn.disabled=false; alert('요청 실패'); }
  }catch(e){ btn.textContent=orig; btn.disabled=false; alert('오류: '+e.message); }
}
function fmt(v){v=+v||0;if(v>=1e8)return (v/1e8).toFixed(1)+'억';if(v>=1e4)return (v/1e4).toFixed(1)+'만';if(v>=1e3)return (v/1e3).toFixed(1)+'천';return ''+v;}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function setSort(k){
  sortKey=k;
  document.getElementById('sb-ol').classList.toggle('on',k==='outlier');
  document.getElementById('sb-vw').classList.toggle('on',k==='views');
  render();
}
function setType(t){
  filtType=t;
  ['all','shorts','video'].forEach(x=>document.getElementById('ft-'+x).classList.toggle('on',x===t));
  render();
}
function setRecent(r){
  recentOnly=r;
  document.getElementById('fp-all').classList.toggle('on',!r);
  document.getElementById('fp-recent').classList.toggle('on',r);
  render();
}
function isRecent(dateStr){
  if(!dateStr) return false;
  const d=new Date(dateStr); if(isNaN(d)) return false;
  return (Date.now()-d.getTime()) <= 183*24*3600*1000;  // 6개월
}
function render(){
  let arr=VIDS.filter(v=>{
    if(filtType!=='all' && v.type!==filtType) return false;
    if(recentOnly && !isRecent(v.date)) return false;
    return true;
  });
  arr.sort((a,b)=>b[sortKey]-a[sortKey]);
  document.getElementById('cnt').textContent=arr.length+'개';
  if(arr.length===0){document.getElementById('list').innerHTML='<p style="color:var(--t3);padding:30px;text-align:center">조건에 맞는 영상이 없습니다.</p>';return;}
  document.getElementById('list').innerHTML=arr.map((v,i)=>{
    const ol = v.outlier>=2 ? `<span class="olbadge">🔥${v.outlier}배</span>` : '';
    const tb = `<span class="typebadge ${v.type}">${v.type==='shorts'?'Shorts':'영상'}</span>`;
    return `<div class="card">
      <div class="rank">#${i+1}</div>
      <a class="thumb" href="${esc(v.url)}" target="_blank">
        <img src="${esc(v.thumb)}" loading="lazy">${ol}${tb}
        <span class="dur">${esc(v.dur)}</span>
      </a>
      <div class="body">
        <div class="title">${esc(v.title)}</div>
        <div class="ch">${esc(v.channel)}</div>
        <div class="metrics">
          <div class="m"><div class="l">조회수</div><div class="v vw">${fmt(v.views)}</div></div>
          <div class="m"><div class="l">구독자</div><div class="v">${fmt(v.subs)}</div></div>
          <div class="m"><div class="l">아웃라이어</div><div class="v ol">${v.outlier?v.outlier+'배':'-'}</div></div>
        </div>
        <div class="foot">
          <span class="date">${esc(v.date)}</span>
          <div class="btns">
            <a class="btn btn-yt" href="${esc(v.url)}" target="_blank">유튜브 ↗</a>
            <a class="btn btn-yt" href="${esc(v.channelUrl)}" target="_blank">채널 ↗</a>
            <button class="btn btn-an" onclick="analyzeCh('${esc(v.channelUrl)}',this)">📊 이 채널 분석</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}
render();
</script>
</body></html>
