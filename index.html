<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>모멘트핏 · SNS 분석 리포트</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F4F8; --card:#fff;
  --text:#191F28; --sub:#6B7684; --sub2:#8B95A1;
  --line:#E8EBF0; --line2:#DFE3EA;
  --blue:#3182F6; --blue-d:#1B64DA;
  --grad:linear-gradient(135deg,#3182F6 0%,#6C5CE7 100%);
  --r:22px; --rs:14px; --rxs:12px;
  --sh:0 4px 20px rgba(70,90,130,.08);
  --sh-lg:0 14px 44px rgba(70,90,130,.16);
  --ease:cubic-bezier(.34,1.2,.44,1);
}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;font-size:14px;
  -webkit-font-smoothing:antialiased;position:relative;min-height:100vh}
body::before{content:'';position:fixed;inset:-25%;z-index:-1;pointer-events:none;
  background:
    radial-gradient(circle at 22% 22%, rgba(49,130,246,.22), transparent 38%),
    radial-gradient(circle at 80% 26%, rgba(139,92,246,.20), transparent 40%),
    radial-gradient(circle at 60% 82%, rgba(83,200,255,.16), transparent 40%),
    radial-gradient(circle at 14% 78%, rgba(255,120,200,.11), transparent 38%);
  filter:blur(8px);animation:blob 22s ease-in-out infinite}
@keyframes blob{
  0%,100%{transform:translate(0,0) scale(1) rotate(0deg)}
  33%{transform:translate(2.5%,3%) scale(1.07) rotate(3deg)}
  66%{transform:translate(-2.5%,-2%) scale(.95) rotate(-3deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.wrap{max-width:720px;margin:0 auto;padding:56px 24px 90px}

.hdr{text-align:center;margin-bottom:42px;animation:fadeUp .55s var(--ease) both}
.hdr .logo{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--sub);
  margin-bottom:20px;background:rgba(255,255,255,.7);backdrop-filter:blur(12px);
  padding:8px 18px;border-radius:30px;box-shadow:var(--sh);border:1px solid rgba(255,255,255,.6)}
.hdr .dot{width:9px;height:9px;border-radius:50%;background:var(--grad);
  box-shadow:0 0 12px rgba(108,92,231,.6)}
.hdr h1{font-size:38px;font-weight:800;letter-spacing:-1.3px;margin-bottom:12px;line-height:1.2;
  background:linear-gradient(115deg,#191F28 30%,#3182F6 70%,#6C5CE7 100%);-webkit-background-clip:text;
  background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 24px rgba(49,130,246,.22))}
.hdr p{font-size:15px;color:var(--sub);line-height:1.65}
.libbtn{display:inline-flex;align-items:center;gap:6px;margin-top:20px;font-size:14px;font-weight:700;
  color:var(--blue);background:#fff;border:1px solid var(--line2);border-radius:14px;padding:11px 22px;
  box-shadow:var(--sh);transition:.2s var(--ease)}
.libbtn:hover{transform:translateY(-2px);box-shadow:var(--sh-lg)}

.form-card{background:rgba(255,255,255,.62);backdrop-filter:blur(26px) saturate(170%);
  -webkit-backdrop-filter:blur(26px) saturate(170%);border:1px solid rgba(255,255,255,.75);
  border-radius:var(--r);padding:32px;margin-bottom:42px;
  box-shadow:0 12px 48px rgba(70,90,130,.15),inset 0 1px 0 rgba(255,255,255,.7);
  animation:fadeUp .65s var(--ease) both;animation-delay:.05s}
.fld{margin-bottom:22px}
.fld label{display:block;font-size:14px;font-weight:700;color:var(--text);margin-bottom:11px}
.plat-row{display:flex;gap:10px}
.plat{flex:1;padding:16px 10px;border-radius:var(--rs);background:#F2F4F8;border:2px solid transparent;
  color:var(--sub);font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:.2s var(--ease)}
.plat:hover{background:#E8EBF0}
.plat.on{background:#fff;color:var(--blue);border-color:var(--blue);box-shadow:0 3px 14px rgba(49,130,246,.2)}
.plat.on.yt{color:#ff0000;border-color:#ff0000;box-shadow:0 3px 14px rgba(255,0,0,.16)}
.plat.on.dc{color:#8b5cf6;border-color:#8b5cf6;box-shadow:0 3px 14px rgba(139,92,246,.2)}
input[type=text]{width:100%;padding:17px 18px;border-radius:var(--rs);background:#F2F4F8;
  border:2px solid transparent;color:var(--text);font-size:15px;outline:none;transition:.2s;font-family:inherit}
input[type=text]:focus{background:#fff;border-color:var(--blue);box-shadow:0 0 0 4px rgba(49,130,246,.13)}
input[type=text]::placeholder{color:var(--sub2)}
.btn{width:100%;padding:18px;border-radius:var(--rs);background:var(--grad);color:#fff;border:none;
  font-size:16px;font-weight:800;cursor:pointer;transition:.2s var(--ease);font-family:inherit;
  box-shadow:0 8px 24px rgba(49,130,246,.32);background-size:140% 140%;animation:gradShift 5s ease infinite}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(108,92,231,.45)}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.hint{font-size:13px;color:var(--sub2);margin-top:11px;line-height:1.6}
.msg{margin-top:14px;font-size:14px;padding:14px 16px;border-radius:var(--rs);display:none;font-weight:600}
.msg.ok{display:block;background:#E7F3EC;color:#0C8A4E}
.msg.err{display:block;background:#FDECEC;color:#E02D2D}

.list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:0 6px}
.list-head h2{font-size:19px;font-weight:800}
.refresh{font-size:12px;color:var(--sub2)}
.job{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.66);
  backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);
  border:1px solid rgba(255,255,255,.6);border-radius:var(--rs);
  padding:16px 20px;margin-bottom:11px;box-shadow:var(--sh);transition:.2s var(--ease)}
.job:hover{transform:translateY(-2px);box-shadow:var(--sh-lg)}
.job-ico{font-size:20px;flex-shrink:0;width:44px;height:44px;border-radius:13px;background:#F2F4F8;
  display:flex;align-items:center;justify-content:center}
.job-body{flex:1;min-width:0}
.job-url{font-size:14px;color:var(--text);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-meta{font-size:12px;color:var(--sub2);margin-top:3px}
.badge{flex-shrink:0;font-size:12px;font-weight:700;padding:6px 13px;border-radius:30px}
.b-pending{background:#FFF4E0;color:#E08D00}
.b-processing{background:#E5EFFF;color:#1B64DA}
.b-done{background:#E7F3EC;color:#0C8A4E}
.b-error{background:#FDECEC;color:#E02D2D}
.job-link{flex-shrink:0;padding:10px 17px;border-radius:13px;background:var(--grad);color:#fff;
  font-size:13px;font-weight:700;text-decoration:none;transition:.2s var(--ease);box-shadow:0 4px 14px rgba(49,130,246,.26)}
.job-link:hover{transform:translateY(-1px)}
.job-del{flex-shrink:0;width:36px;height:36px;border-radius:12px;background:#F2F4F8;border:none;
  color:var(--sub2);font-size:13px;cursor:pointer;transition:.18s}
.job-del:hover{background:#FDECEC;color:#E02D2D}
.clear-btn{font-size:12px;color:var(--sub);background:#fff;border:1px solid var(--line2);
  border-radius:11px;padding:8px 15px;cursor:pointer;transition:.18s;font-weight:600}
.clear-btn:hover{background:#F2F4F8}
.empty{text-align:center;color:var(--sub2);font-size:14px;padding:44px 0}
.spin{display:inline-block;width:11px;height:11px;border:2px solid currentColor;border-right-color:transparent;
  border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="logo"><span class="dot"></span> 모멘트핏 마케팅</div>
    <h1>SNS 분석 리포트</h1>
    <p>인스타그램·유튜브 계정 주소를 넣으면 분석 리포트를 자동으로 만들어 드립니다.</p>
    <a href="/library.html" class="libbtn">📚 분석 라이브러리 보기</a>
  </div>

  <!-- 입력 -->
  <div class="form-card">
    <div class="fld">
      <label>무엇을 할까요?</label>
      <div class="plat-row">
        <div class="plat on" id="p-ig" onclick="setPlat('instagram')">📷 인스타 분석</div>
        <div class="plat yt" id="p-yt" onclick="setPlat('youtube')">▶ 유튜브 분석</div>
        <div class="plat dc" id="p-dc" onclick="setPlat('discover')">🔍 키워드 발굴</div>
      </div>
    </div>
    <div class="fld">
      <label id="inlabel">계정 / 채널 주소</label>
      <input type="text" id="url" placeholder="https://www.instagram.com/계정명/  또는  @핸들">
      <div class="hint" id="hint">예: https://www.instagram.com/sub_koo/ · 인스타는 최근 6개월 릴스, 유튜브는 최근 6개월 숏츠를 분석합니다.</div>
    </div>
    <button class="btn" id="submit" onclick="submitJob()">분석 요청하기</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- 목록 -->
  <div class="list-head">
    <h2>분석 현황</h2>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="clear-btn" onclick="clearDone()">완료·실패 모두 삭제</button>
      <span class="refresh">5초마다 자동 갱신</span>
    </div>
  </div>
  <div id="list"><div class="empty">아직 요청이 없습니다.</div></div>

</div>

<script>
const SUPABASE_URL = "https://vnkvpvgnkevftfwltivs.supabase.co";
const KEY = "sb_publishable_QXcyJbDiHriUqIji3r7YDQ_YTfqc-vB";
const REST = SUPABASE_URL + "/rest/v1/jobs";
const HEADERS = { "apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json" };

let platform = "instagram";
function setPlat(p){
  platform = p;
  document.getElementById('p-ig').classList.toggle('on', p==='instagram');
  document.getElementById('p-yt').classList.toggle('on', p==='youtube');
  document.getElementById('p-dc').classList.toggle('on', p==='discover');
  const url=document.getElementById('url'), hint=document.getElementById('hint');
  const lbl=document.getElementById('inlabel'), btn=document.getElementById('submit');
  if(p==='discover'){
    lbl.textContent='검색 키워드';
    url.placeholder='키워드 입력 (예: 다이어트, 홈트, 부업)';
    hint.textContent='유튜브 숏츠를 키워드로 검색해 아웃라이어·조회수 순으로 발굴합니다. (구독자 적은데 터진 영상 찾기)';
    btn.textContent='🔍 발굴하기';
  }else{
    lbl.textContent='계정 / 채널 주소';
    btn.textContent='분석 요청하기';
    if(p==='instagram'){ url.placeholder='https://www.instagram.com/계정명/  또는  @핸들';
      hint.textContent='예: https://www.instagram.com/sub_koo/ · 최근 6개월 릴스를 분석합니다.'; }
    else{ url.placeholder='https://www.youtube.com/@채널명';
      hint.textContent='예: https://www.youtube.com/@채널명 · 최근 6개월 숏츠를 분석합니다.'; }
  }
}

// URL로 플랫폼 자동 감지 (발굴 모드일 땐 끔)
document.getElementById('url').addEventListener('input', e=>{
  if(platform==='discover') return;
  const v = e.target.value.toLowerCase();
  if(v.includes('youtube.com')||v.includes('youtu.be')) setPlat('youtube');
  else if(v.includes('instagram.com')) setPlat('instagram');
});

function showMsg(text, ok){
  const m = document.getElementById('msg');
  m.textContent = text; m.className = 'msg ' + (ok?'ok':'err');
}

async function submitJob(){
  const url = document.getElementById('url').value.trim();
  if(!url){ showMsg(platform==='discover'?'키워드를 입력해 주세요.':'주소를 입력해 주세요.', false); return; }
  const btn = document.getElementById('submit');
  const origLabel = platform==='discover' ? '🔍 발굴하기' : '분석 요청하기';
  btn.disabled = true; btn.textContent = '요청 중…';
  try{
    const r = await fetch(REST, {
      method:'POST',
      headers:{...HEADERS, "Prefer":"return=minimal"},
      body: JSON.stringify({ platform, url })
    });
    if(r.ok){
      showMsg('✅ 요청 완료! 아래 현황에서 진행 상태를 확인하세요. (몇 분 소요)', true);
      document.getElementById('url').value = '';
      loadJobs();
    } else {
      const t = await r.text();
      showMsg('요청 실패: ' + t.slice(0,150), false);
    }
  }catch(e){ showMsg('네트워크 오류: ' + e.message, false); }
  btn.disabled = false; btn.textContent = origLabel;
}

const BADGE = {
  pending:    ['b-pending','대기중'],
  processing: ['b-processing','<span class="spin"></span>분석중'],
  done:       ['b-done','완료'],
  error:      ['b-error','실패'],
};
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadJobs(){
  try{
    const r = await fetch(REST + "?order=created_at.desc&limit=30", { headers: HEADERS });
    const jobs = await r.json();
    const list = document.getElementById('list');
    if(!Array.isArray(jobs) || jobs.length===0){
      list.innerHTML = '<div class="empty">아직 요청이 없습니다.</div>'; return;
    }
    list.innerHTML = jobs.map(j=>{
      const [bc,bt] = BADGE[j.status] || ['b-pending', j.status];
      const ico = j.platform==='youtube' ? '▶' : j.platform==='discover' ? '🔍' : '📷';
      const linkTxt = j.platform==='discover' ? '발굴 결과 보기' : '리포트 보기';
      const link = (j.status==='done' && j.result_url)
        ? `<a class="job-link" href="${esc(j.result_url)}" target="_blank">${linkTxt}</a>` : '';
      const err = (j.status==='error' && j.error_msg)
        ? `<div class="job-meta" style="color:#f87171">${esc(j.error_msg).slice(0,80)}</div>` : '';
      return `<div class="job">
        <div class="job-ico">${ico}</div>
        <div class="job-body">
          <div class="job-url">${esc(j.url)}</div>
          <div class="job-meta">${esc(j.platform)} · ${new Date(j.created_at).toLocaleString('ko-KR')}</div>
          ${err}
        </div>
        <span class="badge ${bc}">${bt}</span>
        ${link}
        <button class="job-del" onclick="delJob(${j.id})" title="목록에서 삭제">✕</button>
      </div>`;
    }).join('');
  }catch(e){ /* 무시 */ }
}

async function delJob(id){
  if(!confirm('이 항목을 목록에서 삭제할까요?')) return;
  try{
    await fetch(REST + "?id=eq." + id, { method:'DELETE', headers: HEADERS });
    loadJobs();
  }catch(e){ alert('삭제 실패: ' + e.message); }
}

async function clearDone(){
  if(!confirm('완료·실패한 항목을 모두 삭제할까요? (진행중은 유지)')) return;
  try{
    await fetch(REST + "?status=in.(done,error)", { method:'DELETE', headers: HEADERS });
    loadJobs();
  }catch(e){ alert('삭제 실패: ' + e.message); }
}

loadJobs();
setInterval(loadJobs, 5000);
</script>
</body>
</html>
