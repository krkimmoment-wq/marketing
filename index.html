<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>모멘트핏 · SNS 분석 리포트</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070707;--s1:#111;--s2:#181818;--s3:#212121;--s4:#2a2a2a;
  --br:#1f1f1f;--br2:#2c2c2c;--t1:#f0f0f0;--t2:#8c8c8c;--t3:#555;
  --ac:#e1306c;--blue:#3b82f6;--green:#059669;--amber:#f59e0b;--red:#ef4444;
  --r:14px;--rs:10px;--ease:cubic-bezier(.4,0,.2,1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--t1);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:48px 24px 80px}

.hdr{text-align:center;margin-bottom:40px}
.hdr .logo{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:16px}
.hdr .dot{width:9px;height:9px;border-radius:3px;background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)}
.hdr h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.hdr p{font-size:14px;color:var(--t2)}

/* 입력 카드 */
.form-card{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:26px;margin-bottom:40px}
.fld{margin-bottom:18px}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:8px}
.plat-row{display:flex;gap:8px}
.plat{flex:1;padding:12px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--br2);
  color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.15s}
.plat:hover{background:var(--s3)}
.plat.on{background:var(--ac);color:#fff;border-color:transparent}
.plat.on.yt{background:#ff0000}
.plat.on.dc{background:#8b5cf6}
input[type=text]{width:100%;padding:13px 15px;border-radius:var(--rs);background:var(--s2);
  border:1px solid var(--br2);color:var(--t1);font-size:14px;outline:none;transition:.15s}
input[type=text]:focus{border-color:var(--ac)}
input[type=text]::placeholder{color:var(--t3)}
.btn{width:100%;padding:14px;border-radius:var(--rs);background:var(--ac);color:#fff;border:none;
  font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.hint{font-size:11.5px;color:var(--t3);margin-top:8px;line-height:1.6}
.msg{margin-top:12px;font-size:13px;padding:10px 14px;border-radius:var(--rs);display:none}
.msg.ok{display:block;background:rgba(5,150,105,.12);color:#34d399;border:1px solid rgba(5,150,105,.3)}
.msg.err{display:block;background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.3)}

/* 목록 */
.list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
  padding-bottom:12px;border-bottom:1px solid var(--br)}
.list-head h2{font-size:16px;font-weight:700}
.refresh{font-size:11px;color:var(--t3)}
.job{display:flex;align-items:center;gap:14px;background:var(--s1);border:1px solid var(--br);
  border-radius:var(--r);padding:15px 18px;margin-bottom:10px}
.job-ico{font-size:18px;flex-shrink:0;width:30px;text-align:center}
.job-body{flex:1;min-width:0}
.job-url{font-size:13px;color:var(--t1);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-meta{font-size:11px;color:var(--t3);margin-top:2px}
.badge{flex-shrink:0;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px}
.b-pending{background:rgba(245,158,11,.15);color:var(--amber)}
.b-processing{background:rgba(59,130,246,.15);color:var(--blue)}
.b-done{background:rgba(5,150,105,.15);color:#34d399}
.b-error{background:rgba(239,68,68,.15);color:#f87171}
.job-link{flex-shrink:0;padding:7px 14px;border-radius:8px;background:var(--ac);color:#fff;
  font-size:12px;font-weight:700;text-decoration:none;transition:.15s}
.job-link:hover{opacity:.9}
.job-del{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:var(--s3);
  border:1px solid var(--br2);color:var(--t3);font-size:12px;cursor:pointer;transition:.15s}
.job-del:hover{background:var(--red);color:#fff;border-color:transparent}
.clear-btn{font-size:11px;color:var(--t2);background:var(--s2);border:1px solid var(--br2);
  border-radius:6px;padding:5px 11px;cursor:pointer;transition:.15s}
.clear-btn:hover{background:var(--s3);color:var(--t1)}
.empty{text-align:center;color:var(--t3);font-size:13px;padding:30px 0}
.spin{display:inline-block;width:11px;height:11px;border:2px solid currentColor;border-right-color:transparent;
  border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="logo"><span class="dot"></span> 모멘트핏 마케팅</div>
    <h1>SNS 분석 리포트</h1>
    <p>인스타그램·유튜브 계정 주소를 넣으면 분석 리포트를 자동으로 만들어 드립니다.</p>
    <a href="/library.html" style="display:inline-block;margin-top:12px;font-size:13px;color:var(--ac);
      border:1px solid rgba(225,48,108,.3);border-radius:8px;padding:7px 16px">📚 분석 라이브러리 보기</a>
  </div>

  <!-- 입력 -->
  <div class="form-card">
    <div class="fld">
      <label>무엇을 할까요?</label>
      <div class="plat-row">
        <div class="plat on" id="p-ig" onclick="setPlat('instagram')">📷 인스타 분석</div>
        <div class="plat yt" id="p-yt" onclick="setPlat('youtube')">▶ 유튜브 분석</div>
        <div class="plat dc" id="p-dc" onclick="setPlat('discover')">🔍 키워드 발굴</div>
      </div>
    </div>
    <div class="fld">
      <label id="inlabel">계정 / 채널 주소</label>
      <input type="text" id="url" placeholder="https://www.instagram.com/계정명/  또는  @핸들">
      <div class="hint" id="hint">예: https://www.instagram.com/sub_koo/ · 인스타는 최근 6개월 릴스, 유튜브는 최근 6개월 숏츠를 분석합니다.</div>
    </div>
    <button class="btn" id="submit" onclick="submitJob()">분석 요청하기</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- 목록 -->
  <div class="list-head">
    <h2>분석 현황</h2>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="clear-btn" onclick="clearDone()">완료·실패 모두 삭제</button>
      <span class="refresh">5초마다 자동 갱신</span>
    </div>
  </div>
  <div id="list"><div class="empty">아직 요청이 없습니다.</div></div>

</div>

<script>
const SUPABASE_URL = "https://vnkvpvgnkevftfwltivs.supabase.co";
const KEY = "sb_publishable_QXcyJbDiHriUqIji3r7YDQ_YTfqc-vB";
const REST = SUPABASE_URL + "/rest/v1/jobs";
const HEADERS = { "apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json" };

let platform = "instagram";
function setPlat(p){
  platform = p;
  document.getElementById('p-ig').classList.toggle('on', p==='instagram');
  document.getElementById('p-yt').classList.toggle('on', p==='youtube');
  document.getElementById('p-dc').classList.toggle('on', p==='discover');
  const url=document.getElementById('url'), hint=document.getElementById('hint');
  const lbl=document.getElementById('inlabel'), btn=document.getElementById('submit');
  if(p==='discover'){
    lbl.textContent='검색 키워드';
    url.placeholder='키워드 입력 (예: 다이어트, 홈트, 부업)';
    hint.textContent='유튜브 숏츠를 키워드로 검색해 아웃라이어·조회수 순으로 발굴합니다. (구독자 적은데 터진 영상 찾기)';
    btn.textContent='🔍 발굴하기';
  }else{
    lbl.textContent='계정 / 채널 주소';
    btn.textContent='분석 요청하기';
    if(p==='instagram'){ url.placeholder='https://www.instagram.com/계정명/  또는  @핸들';
      hint.textContent='예: https://www.instagram.com/sub_koo/ · 최근 6개월 릴스를 분석합니다.'; }
    else{ url.placeholder='https://www.youtube.com/@채널명';
      hint.textContent='예: https://www.youtube.com/@채널명 · 최근 6개월 숏츠를 분석합니다.'; }
  }
}

// URL로 플랫폼 자동 감지 (발굴 모드일 땐 끔)
document.getElementById('url').addEventListener('input', e=>{
  if(platform==='discover') return;
  const v = e.target.value.toLowerCase();
  if(v.includes('youtube.com')||v.includes('youtu.be')) setPlat('youtube');
  else if(v.includes('instagram.com')) setPlat('instagram');
});

function showMsg(text, ok){
  const m = document.getElementById('msg');
  m.textContent = text; m.className = 'msg ' + (ok?'ok':'err');
}

async function submitJob(){
  const url = document.getElementById('url').value.trim();
  if(!url){ showMsg(platform==='discover'?'키워드를 입력해 주세요.':'주소를 입력해 주세요.', false); return; }
  const btn = document.getElementById('submit');
  const origLabel = platform==='discover' ? '🔍 발굴하기' : '분석 요청하기';
  btn.disabled = true; btn.textContent = '요청 중…';
  try{
    const r = await fetch(REST, {
      method:'POST',
      headers:{...HEADERS, "Prefer":"return=minimal"},
      body: JSON.stringify({ platform, url })
    });
    if(r.ok){
      showMsg('✅ 요청 완료! 아래 현황에서 진행 상태를 확인하세요. (몇 분 소요)', true);
      document.getElementById('url').value = '';
      loadJobs();
    } else {
      const t = await r.text();
      showMsg('요청 실패: ' + t.slice(0,150), false);
    }
  }catch(e){ showMsg('네트워크 오류: ' + e.message, false); }
  btn.disabled = false; btn.textContent = origLabel;
}

const BADGE = {
  pending:    ['b-pending','대기중'],
  processing: ['b-processing','<span class="spin"></span>분석중'],
  done:       ['b-done','완료'],
  error:      ['b-error','실패'],
};
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function loadJobs(){
  try{
    const r = await fetch(REST + "?order=created_at.desc&limit=30", { headers: HEADERS });
    const jobs = await r.json();
    const list = document.getElementById('list');
    if(!Array.isArray(jobs) || jobs.length===0){
      list.innerHTML = '<div class="empty">아직 요청이 없습니다.</div>'; return;
    }
    list.innerHTML = jobs.map(j=>{
      const [bc,bt] = BADGE[j.status] || ['b-pending', j.status];
      const ico = j.platform==='youtube' ? '▶' : j.platform==='discover' ? '🔍' : '📷';
      const linkTxt = j.platform==='discover' ? '발굴 결과 보기' : '리포트 보기';
      const link = (j.status==='done' && j.result_url)
        ? `<a class="job-link" href="${esc(j.result_url)}" target="_blank">${linkTxt}</a>` : '';
      const err = (j.status==='error' && j.error_msg)
        ? `<div class="job-meta" style="color:#f87171">${esc(j.error_msg).slice(0,80)}</div>` : '';
      return `<div class="job">
        <div class="job-ico">${ico}</div>
        <div class="job-body">
          <div class="job-url">${esc(j.url)}</div>
          <div class="job-meta">${esc(j.platform)} · ${new Date(j.created_at).toLocaleString('ko-KR')}</div>
          ${err}
        </div>
        <span class="badge ${bc}">${bt}</span>
        ${link}
        <button class="job-del" onclick="delJob(${j.id})" title="목록에서 삭제">✕</button>
      </div>`;
    }).join('');
  }catch(e){ /* 무시 */ }
}

async function delJob(id){
  if(!confirm('이 항목을 목록에서 삭제할까요?')) return;
  try{
    await fetch(REST + "?id=eq." + id, { method:'DELETE', headers: HEADERS });
    loadJobs();
  }catch(e){ alert('삭제 실패: ' + e.message); }
}

async function clearDone(){
  if(!confirm('완료·실패한 항목을 모두 삭제할까요? (진행중은 유지)')) return;
  try{
    await fetch(REST + "?status=in.(done,error)", { method:'DELETE', headers: HEADERS });
    loadJobs();
  }catch(e){ alert('삭제 실패: ' + e.message); }
}

loadJobs();
setInterval(loadJobs, 5000);
</script>
</body>
</html>
