<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>모멘트핏 · 분석 라이브러리</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070707;--s1:#111;--s2:#181818;--s3:#212121;--s4:#2a2a2a;
  --br:#1f1f1f;--br2:#2c2c2c;--t1:#f0f0f0;--t2:#8c8c8c;--t3:#555;
  --ac:#e1306c;--yt:#ff0000;--dc:#8b5cf6;--green:#059669;
  --r:14px;--rs:10px;--ease:cubic-bezier(.4,0,.2,1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--t1);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:880px;margin:0 auto;padding:44px 24px 80px}
.hdr{margin-bottom:30px}
.back{font-size:12px;color:var(--t3);display:inline-block;margin-bottom:14px}
.back:hover{color:var(--t2)}
.hdr h1{font-size:26px;font-weight:800;margin-bottom:6px}
.hdr p{font-size:14px;color:var(--t2)}
.tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:8px;background:var(--s2);border:1px solid var(--br2);
  color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.tab.on{background:var(--s4);color:var(--t1);border-color:#444}
.tab .n{font-size:11px;color:var(--t3);margin-left:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:18px;
  display:flex;flex-direction:column;gap:10px;transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.5)}
.c-top{display:flex;align-items:center;gap:9px}
.c-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0}
.c-ico.ig{background:rgba(225,48,108,.15)}
.c-ico.yt{background:rgba(255,0,0,.15)}
.c-ico.dc{background:rgba(139,92,246,.15)}
.c-type{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.c-title{font-size:14px;font-weight:600;line-height:1.4;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-date{font-size:11px;color:var(--t3)}
.c-link{margin-top:auto;text-align:center;padding:9px;border-radius:8px;background:var(--ac);
  color:#fff;font-size:12px;font-weight:700;transition:opacity .15s}
.c-link:hover{opacity:.88}
.c-link.dc{background:var(--dc)}
.empty{text-align:center;color:var(--t3);font-size:14px;padding:60px 0}
.loading{text-align:center;color:var(--t3);padding:40px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <a href="/" class="back">← 분석 요청 페이지로</a>
    <h1>📚 분석 라이브러리</h1>
    <p>지금까지 분석·발굴한 결과를 모아봅니다.</p>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab on" data-f="all" onclick="setTab('all')">전체 <span class="n" id="n-all"></span></div>
    <div class="tab" data-f="instagram" onclick="setTab('instagram')">📷 인스타 <span class="n" id="n-instagram"></span></div>
    <div class="tab" data-f="youtube" onclick="setTab('youtube')">▶ 유튜브 <span class="n" id="n-youtube"></span></div>
    <div class="tab" data-f="discover" onclick="setTab('discover')">🔍 발굴 <span class="n" id="n-discover"></span></div>
  </div>

  <div id="grid" class="grid"><div class="loading">불러오는 중…</div></div>
</div>

<script>
const SUPA_REST = "https://vnkvpvgnkevftfwltivs.supabase.co/rest/v1/jobs";
const SUPA_KEY = "sb_publishable_QXcyJbDiHriUqIji3r7YDQ_YTfqc-vB";
const H = { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY };

let DATA = [], curTab = 'all';
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

const META = {
  instagram: ['ig','📷','인스타 분석'],
  youtube:   ['yt','▶','유튜브 분석'],
  discover:  ['dc','🔍','키워드 발굴'],
};

function setTab(f){
  curTab = f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.f===f));
  render();
}

function render(){
  const arr = curTab==='all' ? DATA : DATA.filter(j=>j.platform===curTab);
  const grid = document.getElementById('grid');
  if(arr.length===0){ grid.innerHTML = '<div class="empty">아직 완료된 항목이 없습니다.</div>'; return; }
  grid.innerHTML = arr.map(j=>{
    const [cls,ico,label] = META[j.platform] || ['','📄', j.platform];
    const title = esc(j.url);
    const date = new Date(j.created_at).toLocaleDateString('ko-KR');
    const linkTxt = j.platform==='discover' ? '발굴 결과 보기' : '리포트 보기';
    return `<div class="card">
      <div class="c-top"><div class="c-ico ${cls}">${ico}</div>
        <div><div class="c-type">${label}</div></div></div>
      <div class="c-title">${title}</div>
      <div class="c-date">${date}</div>
      <a class="c-link ${j.platform==='discover'?'dc':''}" href="${esc(j.result_url)}" target="_blank">${linkTxt}</a>
    </div>`;
  }).join('');
}

async function load(){
  try{
    const r = await fetch(SUPA_REST + "?status=eq.done&order=created_at.desc&limit=200", { headers: H });
    DATA = (await r.json()).filter(j=>j.result_url);
    // 카운트
    document.getElementById('n-all').textContent = DATA.length;
    ['instagram','youtube','discover'].forEach(p=>{
      document.getElementById('n-'+p).textContent = DATA.filter(j=>j.platform===p).length;
    });
    render();
  }catch(e){
    document.getElementById('grid').innerHTML = '<div class="empty">불러오기 실패: '+e.message+'</div>';
  }
}
load();
</script>
</body>
</html>
